  // Related articles sidebar (right)
  if (related.length > 0) {
    h += '<nav class="article-related-sidebar">';
    h += '<div class="related-sidebar-title">Related</div>';
    h += '<ul class="related-sidebar-list">';
    for (var ri = 0; ri < related.length; ri++) {
      var rp = related[ri].page;

    }
    h += '</ul></nav>';
  }

  h += '</div>'; // article-layout
  h += '</div>'; // wiki-page
  app.innerHTML = h;

  // Hydrate HTML widgets so their content renders instead of showing source

  // Prevent HTML widgets from trapping page scroll at boundaries
  var hwContainers = app.querySelectorAll('.block-html, [data-type="html-widget"]');
  for (var wi = 0; wi < hwContainers.length; wi++) {

  for (var i = 0; i < wikiLinks.length; i++) {

  if (rev && rev.content) {
    setupReadingProgress();
  } else {

  }

// ── TOC Extraction & Rendering ────────────────────────────────────────────────

function extractTOC(html) {
  var items = [];
  var re = /<(h[23])[^>]*(?:\sid="([^"]*)")?[^>]*>([\s\S]*?)<\/\1>/gi;
  var match;
  while ((match = re.exec(html)) !== null) {
    var level = match[1].toLowerCase();
    var text = match[3].replace(/<[^>]+>/g, '').trim();
    var id = match[2] || 'toc-' + text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    items.push({ level: level, text: text, id: id });
  }
  return items;
}

function renderTocList(items) {
  var h = '<ul class="toc-list">';
  for (var i = 0; i < items.length; i++) {
    var cls = items[i].level === 'h3' ? ' toc-h3' : '';
    h += '<li class="toc-item' + cls + '"><a href="#" data-toc-id="' + esc(items[i].id) + '">' + esc(items[i].text) + '</a></li>';
  }
  h += '</ul>';
  return h;
}

function setupTocTracking() {
  // Add IDs to headings in the article body
  var body = document.getElementById('articleBody');
  if (!body) return;
  var headings = body.querySelectorAll('h2, h3');
  var tocIdx = 0;
  var tocLinks = document.querySelectorAll('[data-toc-id]');
  headings.forEach(function(heading) {
    if (tocIdx < tocLinks.length) {
      heading.id = tocLinks[tocIdx].getAttribute('data-toc-id');
      tocIdx++;
    }
  });

  // Click handling for TOC links
  tocLinks.forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      var target = document.getElementById(this.getAttribute('data-toc-id'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // Scroll-based active state
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        tocLinks.forEach(function(l) { l.classList.remove('active'); });
        var activeLink = document.querySelector('[data-toc-id="' + entry.target.id + '"]');
        if (activeLink) activeLink.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px' });

  headings.forEach(function(heading) {
    if (heading.id) observer.observe(heading);
  });
}

// ── Reading Progress ──────────────────────────────────────────────────────────

var progressHandler = null;

function setupReadingProgress() {
  var bar = document.getElementById('readingProgress');
  if (!bar) return;
  bar.style.display = 'block';
  if (progressHandler) window.removeEventListener('scroll', progressHandler);
  progressHandler = function() {
    var scrollTop = window.scrollY;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var pct = docHeight > 0 ? Math.min(100, (scrollTop / docHeight) * 100) : 0;
    bar.style.width = pct + '%';
  };
  window.addEventListener('scroll', progressHandler, { passive: true });
  progressHandler();
}

function hideReadingProgress() {
  var bar = document.getElementById('readingProgress');
  if (bar) { bar.style.display = 'none'; bar.style.width = '0%'; }
  if (progressHandler) {
    window.removeEventListener('scroll', progressHandler);
    progressHandler = null;
  }
}

// ── Related Articles — Improved ───────────────────────────────────────────────
//
// Three-signal scoring:
//   1. Explicit wiki-links (navigate() in content) — highest confidence
//   2. TF-IDF term overlap — downweights ubiquitous EO vocabulary
//   3. Shared tags — structural grouping signal
//
// Replace the existing RELATED_STOP_WORDS block through findRelatedArticles().
var RELATED_STOP_WORDS = {};
'the a an and or of to in is it for on by at as be do if no so up we he my not but are was has had its can all may you how why what when from with this that will been have they their them into than then each also more some about which would other could'.split(' ').forEach(function(w) { RELATED_STOP_WORDS[w] = true; });
// IDF index — built lazily on first call to findRelatedArticles.
var _idfIndex = null;
// Extract all meaningful terms from a page for IDF/TF computation.
// Uses slug, title, tags, stored keywords, and up to MAX_CONTENT_WORDS of body text.
var MAX_CONTENT_WORDS = 1500;
function _pageTerms(page) {

    if (w.length >= 3) terms.push(w.toLowerCase());

  // Title words
  (page.title || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).forEach(function(w) {
    if (w.length >= 3) terms.push(w);
  });
  // Stored tags
  (page.tags || []).forEach(function(t) {
    if (t.length >= 2) terms.push(t.toLowerCase());
  });
  // Stored keywords
  (page.keywords || []).forEach(function(k) {
    if (k.length >= 2) terms.push(k.toLowerCase());
  });

  var content = page.record &&
                page.record.parsed &&
                page.record.parsed.current_revision &&
                page.record.parsed.current_revision.content || '';
  if (content) {
    var text = content.replace(/<[^>]+>/g, ' ').toLowerCase().replace(/[^a-z0-9\s]/g, '');
    var words = text.split(/\s+/);
    for (var i = 0; i < Math.min(words.length, MAX_CONTENT_WORDS); i++) {

// Extract slugs that this page explicitly links to via navigate('slug').
// These represent editorial judgments — highest-confidence relatedness signal.
function _extractOutgoingLinks(page) {

                page.record.parsed &&
                page.record.parsed.current_revision &&
                page.record.parsed.current_revision.content || '';

  var re = /navigate\(['"]([^'"#]+)['"]\)/g;

// Build the IDF index once over allPages.
// IDF(t) = log((N+1) / (df(t)+1))  — smoothed to avoid division by zero.
// High IDF = rare term = more discriminating.
function _buildIdfIndex() {
  if (_idfIndex) return _idfIndex;
  var N = allPages.length;
  var df = {}; // document frequency per term
  allPages.forEach(function(p) {
    var seen = {};
    _pageTerms(p).forEach(function(t) {
      if (!seen[t]) { df[t] = (df[t] || 0) + 1; seen[t] = true; }
    });

function findRelatedArticles(currentSlug, maxResults) {

  }
  if (!current) return [];
  var idf = _buildIdfIndex();
  // --- Signal 1: explicit wiki-links ---
  // Outgoing: which slugs does the current article link to?
  var outgoing = _extractOutgoingLinks(current);
  // Incoming: build a reverse map — which articles link TO current?
  // (O(N) scan; fine for a wiki of this size)
  var incoming = {};
  allPages.forEach(function(p) {
    if (p.slug === currentSlug) return;
    if (_extractOutgoingLinks(p)[currentSlug]) incoming[p.slug] = true;

  // --- Signal 2: TF-IDF vector for current article ---

  allPages.forEach(function(p) {

    if (p.visibility === 'private' || p.status === 'archived') return;
    if (!p.hasContent && p.status !== 'published') return;
    var score = 0;
    // Signal 1: link graph (+6 per direction, max +12)
    if (outgoing[p.slug]) score += 6;
    if (incoming[p.slug]) score += 6;
    // Signal 2: TF-IDF term overlap
    // Build a term-set for candidate (no need for weights — presence is enough)

    _pageTerms(p).forEach(function(t) { pTermSet[t] = true; });
    Object.keys(currentWeight).forEach(function(t) {
      if (pTermSet[t]) score += currentWeight[t];

    var currentTags = (current.tags || []);
    var pTags = (p.tags || []);
    currentTags.forEach(function(ct) {

function extractArticleKeywords(page) {

  return words;
}

// ── Next Article ──────────────────────────────────────────────────────────────

function findNextArticle(currentSlug, contentType) {
  var pages = allPages.filter(function(p) {
    return p.content_type === contentType && p.visibility !== 'private' &&
           (p.hasContent || p.status === 'published') && p.slug !== currentSlug;
  }).sort(function(a, b) {
    var ta = a.updated_at || '';
    var tb = b.updated_at || '';
    if (tb > ta) return 1;
    if (tb < ta) return -1;
    return 0;
  });
  if (!pages.length) return null;
  // Find current position and return next
  var currentIdx = -1;
  for (var i = 0; i < pages.length; i++) {
    if (pages[i].slug === currentSlug) { currentIdx = i; break; }
  }
  return pages[(currentIdx + 1) % pages.length] || pages[0];
}

// ── Link Rewriting ────────────────────────────────────────────────────────────

function rewriteLinks(html) {
  return html.replace(
    /href="https:\/\/claude\.ai\/wiki\/([^"#]+)(#[^"]*)?"/g,
    function(m, path, hash) {
      var slug = path.replace(/\//g, '-').replace(/^-|-$/g, '');
      return 'href="#' + slug + '" data-wiki-link="' + slug + '"';
    }
  );
}

// ── Auto-Link Articles ────────────────────────────────────────────────────────

function buildAutoLinkIndex(currentSlug) {
  var terms = [];
  var seen = {};

  for (var i = 0; i < allPages.length; i++) {
    var p = allPages[i];
    if (p.slug === currentSlug) continue;
    if (p.visibility === 'private' || p.status === 'archived') continue;
    if (!p.hasContent && p.status !== 'published') continue;
    // Respect opt-out: articles tagged "no-autolink" won't be linked to
    if ((p.tags || []).indexOf('no-autolink') !== -1) continue;

    var candidates = [p.title];
    var kw = p.keywords || [];
    for (var k = 0; k < kw.length; k++) candidates.push(kw[k]);
    var tags = p.tags || [];
    for (var t = 0; t < tags.length; t++) candidates.push(tags[t]);

    for (var c = 0; c < candidates.length; c++) {
      var term = (candidates[c] || '').trim();
      if (term.length < 3) continue;
      var key = term.toLowerCase();
      if (seen[key]) continue;
      seen[key] = true;
      terms.push({ term: term, slug: p.slug, title: p.title });
    }
  }

  terms.sort(function(a, b) { return b.term.length - a.term.length; });
  return terms;
}

function autoLinkArticles(html, currentSlug) {
  if (!allPages || !allPages.length) return html;

  var terms = buildAutoLinkIndex(currentSlug);
  if (!terms.length) return html;

  var container = document.createElement('div');
  container.innerHTML = html;

  var linked = {};
  var SKIP_TAGS = { A: 1, CODE: 1, PRE: 1, SCRIPT: 1, STYLE: 1, TEXTAREA: 1, H1: 1, H2: 1, H3: 1, H4: 1, H5: 1, H6: 1 };

  function walkTextNodes(node) {
    if (node.nodeType === 3) {
      processTextNode(node);
    } else if (node.nodeType === 1 && !SKIP_TAGS[node.tagName]) {
      var children = [];
      for (var i = 0; i < node.childNodes.length; i++) children.push(node.childNodes[i]);
      for (var i = 0; i < children.length; i++) walkTextNodes(children[i]);
    }
  }

  function processTextNode(textNode) {
    var text = textNode.nodeValue;
    if (!text || !text.trim()) return;

    for (var i = 0; i < terms.length; i++) {
      var t = terms[i];
      var linkKey = t.slug + '::' + t.term.toLowerCase();
      if (linked[linkKey]) continue;

      var escaped = t.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var re = new RegExp('\\b(' + escaped + ')\\b', 'i');
      var match = re.exec(text);
      if (!match) continue;

      var before = text.substring(0, match.index);
      var matched = text.substring(match.index, match.index + match[0].length);
      var after = text.substring(match.index + match[0].length);

      var beforeNode = document.createTextNode(before);
      var link = document.createElement('a');
      link.setAttribute('onclick', "navigate('" + t.slug.replace(/'/g, "\\'") + "')");
      link.setAttribute('class', 'auto-link');
      link.setAttribute('title', t.title);
      link.textContent = matched;
      var afterNode = document.createTextNode(after);

      var parent = textNode.parentNode;
      parent.insertBefore(beforeNode, textNode);
      parent.insertBefore(link, textNode);
      parent.insertBefore(afterNode, textNode);
      parent.removeChild(textNode);

      linked[linkKey] = true;

      if (after.trim()) processTextNode(afterNode);
      return;
    }
  }

  walkTextNodes(container);
  return container.innerHTML;
}

// ── HTML Detection ────────────────────────────────────────────────────────────

function looksLikeHtml(content) {
  if (!content) return false;
  var trimmed = content.trim();
  return trimmed.charAt(0) === '<' || /<[a-z][\s\S]*>/i.test(trimmed.slice(0, 200));
}

// ── Markdown Rendering ────────────────────────────────────────────────────────

function renderMarkdown(text) {
  if (!text) return '';
  if (window.marked) {
    try { return window.marked.parse(text); } catch(e) { /* fall through */ }
  }
  return text
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
    .replace(/((?:^\|.+\|[ \t]*\n){2,})/gm, function(tableBlock) {
      var lines = tableBlock.trim().split('\n');
      if (lines.length < 2) return tableBlock;
      if (!/^\|[\s\-:|]+\|$/.test(lines[1].trim())) return tableBlock;
      function parseRow(line) {
        return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(function(c) { return c.trim(); });
      }
      var headers = parseRow(lines[0]);
      var ht = '<table><thead><tr>' + headers.map(function(hd) { return '<th>' + hd + '</th>'; }).join('') + '</tr></thead><tbody>';
      for (var i = 2; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        var cells = parseRow(lines[i]);
        ht += '<tr>' + cells.map(function(c) { return '<td>' + c + '</td>'; }).join('') + '</tr>';
      }
      return ht + '</tbody></table>';
    })
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hulot])(.+)/gm, '<p>$1</p>');
}

      return '<div class="block block-code"><pre><code' +
        (d.lang ? ' class="language-' + esc(String(d.lang)) + '"' : '') + '>' +
        esc(String(d.code || '')) + '</code></pre></div>';

    case 'button':
      var bText = esc(String(d.text || 'Click here'));
      var bStyle = esc(String(d.style || 'primary'));
      var bAction = String(d.action || 'link');
      if (bAction === 'copy') {
        return '<div class="block block-button"><button class="btn btn-' + bStyle + '" data-action="copy" data-copy-text="' + esc(String(d.copyText || '')) + '">' + bText + '</button></div>';
      }
      return '<div class="block block-button"><a class="btn btn-' + bStyle + '" href="' + esc(String(d.url || '#')) + '">' + bText + '</a></div>';

    case 'embed':
      var eSrc = String(d.src || '');
      if (!eSrc) return '';
      var eTitle = String(d.title || '');
      return '<figure class="block block-embed"><iframe src="' + esc(eSrc) + '" title="' + esc(eTitle) + '" loading="lazy" allowfullscreen frameborder="0"></iframe>' +
        (eTitle ? '<figcaption>' + esc(eTitle) + '</figcaption>' : '') + '</figure>';

    case 'video':
      var vsrc = String(d.src || '');
      if (!vsrc) return '';
      var embedSrc = vsrc;
      var yt = vsrc.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
      if (yt) embedSrc = 'https://www.youtube.com/embed/' + yt[1];
      var vim = vsrc.match(/vimeo\.com\/(\d+)/);
      if (vim) embedSrc = 'https://player.vimeo.com/video/' + vim[1];
      var vCap = String(d.caption || '');
      return '<figure class="block block-video"><iframe src="' + esc(embedSrc) + '" title="' + esc(vCap || 'Video') + '" loading="lazy" allowfullscreen frameborder="0"></iframe>' +
        (vCap ? '<figcaption>' + esc(vCap) + '</figcaption>' : '') + '</figure>';

    case 'columns':
      var colRaw = Array.isArray(d.columns) ? d.columns : [];
      var isNewCol = colRaw.length > 0 && typeof colRaw[0] === 'object' && colRaw[0] !== null && colRaw[0].blocks;
      var colsHtml;
      if (isNewCol) {
        colsHtml = colRaw.map(function (col) {
          var inner = (col.block_order || []).map(function (id) {
            return (col.blocks || []).find(function (b) { return b.block_id === id; });
          }).filter(Boolean).map(function (sub) {
            return renderBlock(sub, page);
          }).join('');
          return '<div class="column">' + (inner || '') + '</div>';
        }).join('');
      } else {
        colsHtml = colRaw.map(function (c) { return '<div class="column">' + renderMarkdown(String(c)) + '</div>'; }).join('');
      }
      return '<div class="block block-columns block-columns-' + colRaw.length + '">' + colsHtml + '</div>';

    case 'wiki-embed':
      var wSlug = String(d.slug || d.wiki_id || '');
      if (!wSlug) return '';
      return '<div class="block block-wiki-embed"><a href="#' + esc(wSlug) + '" class="wiki-embed-link">Linked wiki: ' + esc(wSlug) + '</a></div>';

    case 'experiment-embed':
      var expId = String(d.exp_id || '');
      if (!expId) return '';
      var expSlug = expId.replace('experiment:', '');
      return '<div class="block block-experiment-embed"><a href="#' + esc(expSlug) + '" class="exp-embed-link">Linked experiment: ' + esc(expSlug) + '</a></div>';

    case 'toc':
      var tocHeadings = [];
      var tocBlockMap = {};
      (page.blocks || []).forEach(function (b) { tocBlockMap[b.block_id] = b; });
      (page.block_order || []).forEach(function (id) {
        var b = tocBlockMap[id];
        if (!b || b.deleted) return;
        if (b.block_type === 'text') {
          (String(b.data.md || b.data.text || '')).split('\n').forEach(function (line) {
            var m = line.match(/^(#{1,4})\s+(.+)$/);
            if (m) {
              var lvl = m[1].length;
              var txt = m[2];
              var s = txt.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
              tocHeadings.push('<li class="toc-level-' + lvl + '"><a href="#' + s + '">' + esc(txt) + '</a></li>');
            }
          });
        }
        if (b.block_type === 'heading') {
          var htxt = String(b.data.text || '');
          var hs = htxt.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          tocHeadings.push('<li class="toc-level-' + (b.data.level || 2) + '"><a href="#' + hs + '">' + esc(htxt) + '</a></li>');
        }
      });
      if (!tocHeadings.length) return '';
      return '<nav class="block block-toc"><div class="toc-title">Contents</div><ol>' + tocHeadings.join('') + '</ol></nav>';

    case 'html':
      return '<div class="block block-html">' + String(d.html || '') + '</div>';

    default:
      return '<div class="block block-' + block.block_type + '">[' + block.block_type + ']</div>';
  }
}

function renderBlocks(parsed) {
  var blocks = parsed.blocks || [];
  var order = parsed.block_order || [];
  if (!blocks.length || !order.length) return '';
  var blockMap = {};
  for (var i = 0; i < blocks.length; i++) { blockMap[blocks[i].block_id] = blocks[i]; }
  var h = '';
  for (var j = 0; j < order.length; j++) {
    var block = blockMap[order[j]];
    if (!block || block.deleted) continue;
    h += renderBlock(block, parsed);
  }
  return h;
}

// ── Search ────────────────────────────────────────────────────────────────────

var sOvl = document.getElementById('searchOverlay');
var sInp = document.getElementById('searchInput');
var sRes = document.getElementById('searchResults');

document.getElementById('searchBtn').addEventListener('click', function() {
  sOvl.classList.add('open');
  sInp.value = '';
  sInp.focus();
  doSearch('');
});

sOvl.addEventListener('click', function(e) {
  if (e.target === sOvl) sOvl.classList.remove('open');
});

document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    sOvl.classList.add('open');
    sInp.focus();
  }
  if (e.key === 'Escape' && sOvl.classList.contains('open')) {
    sOvl.classList.remove('open');
  }
});

sInp.addEventListener('input', function(e) {
  doSearch(e.target.value);
});

function doSearch(q) {
  q = q.toLowerCase().trim();
  if (!q) {
    sRes.innerHTML = '<div class="search-empty">Type to search\u2026</div>';
    return;
  }
  var m = allPages.filter(function(p) {
    return (p.title || '').toLowerCase().indexOf(q) >= 0 ||
           (p.slug || '').indexOf(q) >= 0 ||
           (p.tags || []).some(function(t) { return t.toLowerCase().indexOf(q) >= 0; }) ||
           (p.keywords || []).some(function(k) { return k.toLowerCase().indexOf(q) >= 0; }) ||
           (p.description || '').toLowerCase().indexOf(q) >= 0;
  });
  if (!m.length) {
    sRes.innerHTML = '<div class="search-empty">No results</div>';
    return;
  }
  sRes.innerHTML = m.map(function(p) {
    return '<div class="search-result" onclick="sOvl.classList.remove(\'open\');navigate(\'' + escAttr(p.slug) + '\')">' +
      '<div class="sr-type">' + esc(p.content_type) + '</div>' +
      '<div class="sr-title">' + esc(p.title) + '</div></div>';
  }).join('');
}

// ── Theme Toggle ──────────────────────────────────────────────────────────────

var tBtn = document.getElementById('themeBtn');
var dk = localStorage.getItem('eo-dark') === '1' || localStorage.getItem('eo-theme') === 'dark';
if (!localStorage.getItem('eo-dark') && !localStorage.getItem('eo-theme')) {
  dk = window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', dk ? 'dark' : '');
  tBtn.textContent = dk ? '\u2600' : '\u263E';
}

tBtn.addEventListener('click', function() {
  dk = !dk;
  localStorage.setItem('eo-dark', dk ? '1' : '0');
  localStorage.setItem('eo-theme', dk ? 'dark' : 'light');
  applyTheme();
});

applyTheme();

// ── Mobile Nav ────────────────────────────────────────────────────────────────

var mobileMenuBtn = document.getElementById('mobileMenuBtn');
var mobileNav = document.getElementById('mobileNav');

function closeMobileNav() {
  if (mobileNav) mobileNav.classList.remove('open');
}

if (mobileMenuBtn && mobileNav) {
  mobileMenuBtn.addEventListener('click', function() {
    mobileNav.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!mobileNav.contains(e.target) && e.target !== mobileMenuBtn) {
      closeMobileNav();
    }
  });
}

// ── Admin Reveal (triple Escape) ──────────────────────────────────────────────

var escCount = 0, escTimer = null;
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape') return;
  if (sOvl.classList.contains('open')) return;
  escCount++;
  clearTimeout(escTimer);
  escTimer = setTimeout(function() { escCount = 0; }, 800);
  if (escCount >= 3) {
    escCount = 0;
    document.getElementById('adminBtn').classList.add('visible');
    try { localStorage.setItem('eo_xano_auth', '1'); } catch(ex) {}
  }
});

// Show admin if previously revealed
try {
  if (localStorage.getItem('eo_xano_auth') === '1') {
    document.getElementById('adminBtn').classList.add('visible');
  }
} catch(e) {}

// ── Utilities ─────────────────────────────────────────────────────────────────

function relativeTime(dateStr) {
  if (!dateStr) return '';
  var now = Date.now();
  var then = new Date(dateStr).getTime();
  if (isNaN(then)) return '';
  var diff = Math.floor((now - then) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) { var m = Math.floor(diff / 60); return m + (m === 1 ? ' min ago' : ' mins ago'); }
  if (diff < 86400) { var h = Math.floor(diff / 3600); return h + (h === 1 ? ' hour ago' : ' hours ago'); }
  if (diff < 2592000) { var d = Math.floor(diff / 86400); return d + (d === 1 ? ' day ago' : ' days ago'); }
  if (diff < 31536000) { var mo = Math.floor(diff / 2592000); return mo + (mo === 1 ? ' month ago' : ' months ago'); }
  var y = Math.floor(diff / 31536000); return y + (y === 1 ? ' year ago' : ' years ago');
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function timeAgo(ts) {
  if (!ts) return '';
  var seconds = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (seconds < 60) return 'just now';
  var minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + 'm ago';
  var hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + 'h ago';
  var days = Math.floor(hours / 24);
  if (days < 7) return days + 'd ago';
  var weeks = Math.floor(days / 7);
  if (weeks < 5) return weeks + 'w ago';
  var months = Math.floor(days / 30);
  if (months < 12) return months + 'mo ago';
  return Math.floor(days / 365) + 'y ago';
}

function escAttr(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// Hydrate <div data-type="html-widget"> elements: TipTap serialises HTML widget
// content as entity-escaped text nodes. After innerHTML assignment the browser
// decodes the entities into text — this converts them back to rendered HTML.
function hydrateHtmlWidgets(container) {
  var widgets = container.querySelectorAll('[data-type="html-widget"]');
  for (var i = 0; i < widgets.length; i++) {
    var w = widgets[i];
    var src = w.textContent || '';
    if (src && src !== w.innerHTML) {
      // If the widget HTML contains page-level styles (body/html selectors)
      // that would leak into the parent page, render inside a sandboxed iframe.
      if (widgetHasPageLevelStyles(src)) {
        widgetRenderAsIframe(w, src);
      } else {
        w.innerHTML = src;
      }
    }
  }
}

// Detect whether widget HTML contains page-level styles that would affect the parent document.
function widgetHasPageLevelStyles(html) {
  var styleRe = /<style[\s\S]*?>([\s\S]*?)<\/style>/gi;
  var match;
  while ((match = styleRe.exec(html)) !== null) {
    var css = match[1];
    if (/(?:^|[},;\s])(?:body|html)\s*\{[^}]*(?:overflow\s*:\s*hidden|height\s*:\s*100vh)/i.test(css)) {
      return true;
    }
  }
  return false;
}

// Auto-size a same-origin iframe to its full content height.
function widgetAutoSizeIframe(iframe) {
  var doc;
  try { doc = iframe.contentDocument || iframe.contentWindow.document; }
  catch (e) { return; }
  var timer = null;
  function measure() {
    try {
      var el = doc.documentElement, body = doc.body;
      var sEH = el.style.height, sBH = body.style.height;
      var sEM = el.style.minHeight, sBM = body.style.minHeight;
      el.style.height = 'auto'; el.style.minHeight = '0';
      body.style.height = 'auto'; body.style.minHeight = '0';
      var h = Math.max(el.scrollHeight, body.scrollHeight);
      el.style.height = sEH; el.style.minHeight = sEM;
      body.style.height = sBH; body.style.minHeight = sBM;
      if (h > 0) iframe.style.height = h + 'px';
    } catch (e) {}
  }
  function dm() { if (timer) clearTimeout(timer); timer = setTimeout(measure, 50); }
  measure();
  if (typeof ResizeObserver !== 'undefined') {
    var ro = new ResizeObserver(dm);
    ro.observe(doc.documentElement);
    if (doc.body) ro.observe(doc.body);
  }
  if (typeof MutationObserver !== 'undefined' && doc.body) {
    new MutationObserver(dm).observe(doc.body, { childList: true, subtree: true });
  }
  setTimeout(measure, 150);
  setTimeout(measure, 600);
  setTimeout(measure, 1500);
}

function widgetRenderAsIframe(container, html) {
  container.innerHTML = '';
  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;border:none;display:block;min-height:60px;';
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
  iframe.srcdoc = html;
  container.appendChild(iframe);
  iframe.addEventListener('load', function () {
    widgetAutoSizeIframe(iframe);
  });
}

// Activate <script> tags after innerHTML insertion so embedded JS runs
function activateScripts(container) {
  var scripts = container.querySelectorAll('script');
  for (var i = 0; i < scripts.length; i++) {
    var old = scripts[i];
    var fresh = document.createElement('script');
    for (var j = 0; j < old.attributes.length; j++) {
      fresh.setAttribute(old.attributes[j].name, old.attributes[j].value);
    }
    fresh.textContent = old.textContent;
    old.parentNode.replaceChild(fresh, old);
  }
}

// ── Legacy URL Support ────────────────────────────────────────────────────────
// Handle old path-based URLs by converting them to hash-based
(function() {
  if (window.location.hash) return; // already has hash, don't override
  var path = window.location.pathname.replace(/\/$/, '');
  var parts = path.split('/').filter(Boolean);
  if (parts.length >= 2) {
    var section = parts[parts.length - 2];
    var slug = parts[parts.length - 1];
    if (['wiki', 'blog', 'exp', 'page'].indexOf(section) >= 0 && slug) {
      window.location.hash = slug;
    }
  }
})();

// ── Load marked.js for better markdown rendering ──────────────────────────────
(function() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/marked@14/marked.min.js';
  s.defer = true;
  document.head.appendChild(s);
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData();
