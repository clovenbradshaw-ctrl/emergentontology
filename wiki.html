<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergent Ontology — Wiki</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;
  --bg2:#F9F9FB;
  --bg3:#F3F3F8;
  --ink:#18181B;
  --ink2:#52525B;
  --ink3:#A1A1AA;
  --border:#E4E4E7;
  --border2:#D4D4D8;
  --purple:#6366F1;
  --purple-bg:#EEF2FF;
  --purple-text:#4338CA;
  --radius:8px;
  --transition-fast:.12s ease;
  --transition-med:.2s ease;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh}

/* ── Focus & Accessibility ── */
:focus-visible{outline:2px solid var(--purple);outline-offset:2px;border-radius:3px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ── Header ── */
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);background:rgba(255,255,255,.92)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:24px}
.logo-icon{width:26px;height:26px;background:var(--purple);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;letter-spacing:-.5px;flex-shrink:0}
.logo-name{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.nav{display:flex;height:100%}
.nav a{display:flex;align-items:center;padding:0 14px;font-size:13.5px;color:var(--ink2);text-decoration:none;border-bottom:2px solid transparent;transition:color var(--transition-fast),border-color var(--transition-fast);font-weight:400}
.nav a:hover{color:var(--ink)}
.nav a.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}

/* ── Mobile menu toggle ── */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;color:var(--ink2);font-size:20px;padding:4px;margin-left:auto}

/* ── Page ── */
.page{max-width:1200px;margin:0 auto;padding:28px 24px}
.breadcrumb{font-size:13px;color:var(--ink3);margin-bottom:20px}
.breadcrumb a{color:var(--ink3);text-decoration:none;transition:color var(--transition-fast)}
.breadcrumb a:hover{color:var(--ink2)}
.breadcrumb span{margin:0 6px}

/* ── Controls bar ── */
.controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.srch-wrap{position:relative;flex:1;max-width:440px;min-width:200px}
.srch-wrap input{width:100%;height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 12px 0 34px;font-size:13.5px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
.srch-wrap input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.srch-wrap input::placeholder{color:var(--ink3)}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px;pointer-events:none;line-height:1}
.srch-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;line-height:1;padding:2px;display:none;transition:color var(--transition-fast)}
.srch-clear:hover{color:var(--ink)}
.srch-wrap.has-query .srch-clear{display:block}

.filter-group{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.fbtn{height:30px;padding:0 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--ink2);font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:400;transition:all .1s;white-space:nowrap}
.fbtn:hover{border-color:var(--border2);background:var(--bg3);color:var(--ink)}
.fbtn.on{background:var(--purple);color:#fff;border-color:var(--purple);font-weight:500}

/* ── Article count + chips ── */
.meta-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;min-height:22px;flex-wrap:wrap}
.art-count{font-size:13px;color:var(--ink3)}
.chip{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 10px;background:var(--purple-bg);color:var(--purple-text);border-radius:100px;font-size:12px;font-weight:500;animation:chipIn .15s ease}
@keyframes chipIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.chip button{background:none;border:none;cursor:pointer;color:var(--purple-text);font-size:13px;line-height:1;padding:0;display:flex;align-items:center;opacity:.7;transition:opacity var(--transition-fast)}
.chip button:hover{opacity:1}

/* ── Concept path bar ── */
.path-bar{background:var(--purple-bg);border:1px solid rgba(99,102,241,.15);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;animation:fadeSlideIn .2s ease}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.path-bar-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.path-bar-title{font-size:12px;font-weight:600;color:var(--purple-text);letter-spacing:.02em}
.path-bar-desc{font-size:12px;color:var(--ink3)}
.path-steps{display:flex;gap:0;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.path-steps::-webkit-scrollbar{height:4px}
.path-steps::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:2px}
.pstep{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:5px 0;cursor:pointer}
.pstep:not(:last-child)::after{content:'→';color:var(--ink3);margin:0 8px;font-size:12px}
.pstep-n{width:18px;height:18px;border-radius:50%;border:1px solid rgba(99,102,241,.35);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--purple-text);font-weight:500;flex-shrink:0;transition:all var(--transition-fast)}
.pstep-t{font-size:12.5px;color:var(--ink);font-weight:500;transition:color var(--transition-fast)}
.pstep-t:hover{color:var(--purple)}
.pstep.found .pstep-n{background:var(--purple);border-color:var(--purple);color:#fff}
.pstep.missing .pstep-t{color:var(--ink3)}

/* ── Section ── */
.section{margin-bottom:28px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer;user-select:none}
.sec-tri{color:var(--ink3);font-size:10px;transition:transform .15s;flex-shrink:0}
.sec-tri.open{transform:none}
.sec-tri.closed{transform:rotate(-90deg)}
.sec-badge{height:22px;padding:0 9px;border-radius:100px;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.sec-n{font-size:12px;color:var(--ink3);margin-left:2px;font-weight:400}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}

/* ── Card ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px 12px;cursor:pointer;transition:border-color var(--transition-fast),box-shadow var(--transition-fast),transform var(--transition-fast);display:flex;flex-direction:column;gap:0}
.card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.card:active{transform:translateY(0)}
.card.selected{border-color:var(--purple);box-shadow:0 0 0 1px var(--purple)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-icon{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--ink3);font-weight:400}
.card-body{flex:1;min-width:0}
.card-title{font-size:13.5px;font-weight:500;color:var(--ink);line-height:1.35;margin-bottom:3px}
.card-time{font-size:11.5px;color:var(--ink3)}
.card-exc{font-size:12.5px;color:var(--ink2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
.ctag{height:20px;padding:0 8px;border-radius:100px;border:1px solid var(--border);font-size:11px;color:var(--ink3);background:var(--bg);display:inline-flex;align-items:center}
.ctag.purple{background:var(--purple-bg);color:var(--purple-text);border-color:rgba(99,102,241,.2)}

/* ── Related panel (slide-in) ── */
.layout{display:flex;gap:0;align-items:flex-start}
.content-area{flex:1;min-width:0}
.panel{width:340px;flex-shrink:0;margin-left:20px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;display:none;animation:panelIn .2s ease}
@keyframes panelIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.panel.open{display:block}
.panel-close{float:right;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;line-height:1;padding:4px;margin-top:-2px;border-radius:4px;transition:color var(--transition-fast),background var(--transition-fast)}
.panel-close:hover{color:var(--ink);background:var(--bg3)}
.panel-lv{margin-bottom:6px}
.panel-title{font-size:17px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:10px;letter-spacing:-.01em}
.panel-exc{font-size:13px;color:var(--ink2);line-height:1.65;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.panel-sh{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.rel-list{list-style:none;margin-bottom:14px}
.rel-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--transition-fast);border-radius:4px;padding-left:4px;padding-right:4px}
.rel-item:hover{background:var(--bg2)}
.rel-item:hover .rel-t{color:var(--purple)}
.rel-item:last-child{border-bottom:none}
.rel-icon{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink3);flex-shrink:0}
.rel-t{font-size:13px;color:var(--ink);flex:1;line-height:1.3;transition:color .1s}
.rel-lv{font-size:11px;color:var(--ink3)}
.open-btn{width:100%;height:36px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;letter-spacing:.01em;transition:background var(--transition-fast),transform var(--transition-fast)}
.open-btn:hover{background:#4F46E5}
.open-btn:active{transform:scale(.98)}

/* ── Reading paths ── */
.reading-paths{margin-bottom:28px}
.rp-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.rp-list{display:flex;gap:6px;flex-wrap:wrap}
.rpath{height:28px;padding:0 12px;border:1px solid var(--border2);border-radius:100px;background:var(--bg);font-size:12.5px;color:var(--ink2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.rpath:hover{border-color:var(--purple);color:var(--purple)}
.rpath.on{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ── Keyboard shortcut hints ── */
.kbd-hint{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;font-size:10px;color:var(--ink3);font-family:inherit;margin-left:6px}

/* ── Loading ── */
.ld{padding:60px;text-align:center;color:var(--ink3);font-size:14px}
.ld-ring{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px;text-align:center;color:var(--ink3)}

/* ── Section collapse animation ── */
.sec-grid-wrap{overflow:hidden;transition:max-height .25s ease}

/* ── Scroll-to-top ── */
.scroll-top{position:fixed;bottom:24px;right:24px;width:36px;height:36px;border-radius:50%;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(99,102,241,.3);opacity:0;transform:translateY(10px);transition:opacity var(--transition-med),transform var(--transition-med);pointer-events:none;z-index:50}
.scroll-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top:hover{background:#4F46E5}

/* ── Responsive ── */
@media(max-width:768px){
  .nav{display:none}
  .nav.mobile-open{display:flex;flex-direction:column;position:absolute;top:52px;left:0;right:0;background:var(--bg);border-bottom:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:99}
  .nav.mobile-open a{padding:12px 20px;border-bottom:1px solid var(--border)}
  .nav.mobile-open a.on{border-bottom:1px solid var(--border);border-left:3px solid var(--ink)}
  .menu-toggle{display:block}
  .page{padding:20px 16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .panel{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;margin:0;border-radius:0;z-index:200;max-height:100vh;animation:panelMobileIn .2s ease}
  @keyframes panelMobileIn{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
  .panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:199;display:none}
  .panel-overlay.open{display:block}
  .filter-group{margin-left:0}
  .controls{gap:8px}
  .srch-wrap{max-width:100%;flex-basis:100%}
  .kbd-hint{display:none}
}

@media(max-width:480px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="hdr">
  <a class="logo" href="#">
    <div class="logo-icon">EO</div>
    <span class="logo-name">Emergent Ontology</span>
  </a>
  <nav class="nav" id="nav">
    <a href="#" class="on">Wiki</a>
    <a href="#">Blog</a>
    <a href="#">Experiments</a>
    <a href="#">Documents</a>
  </nav>
  <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">☰</button>
</header>

<div class="panel-overlay" id="panel-overlay"></div>

<div class="page">
  <div class="breadcrumb"><a href="#">Home</a><span>›</span>Wiki</div>

  <!-- Controls -->
  <div class="controls">
    <div class="srch-wrap" id="srch-wrap">
      <span class="srch-ic">⌕</span>
      <input type="text" id="srch" placeholder="Search articles…" aria-label="Search articles">
      <button class="srch-clear" id="srch-clear" aria-label="Clear search">×</button>
      <span class="kbd-hint">/</span>
    </div>
    <div class="filter-group" id="lv-filters"></div>
    <div class="filter-group">
      <button class="fbtn on" data-v="grouped" id="v-grouped">Grouped</button>
      <button class="fbtn" data-v="level" id="v-level">Level</button>
      <button class="fbtn" data-v="all" id="v-all">All</button>
    </div>
  </div>

  <!-- Reading paths -->
  <div class="reading-paths">
    <div class="rp-title">Reading paths</div>
    <div class="rp-list" id="rp-list"></div>
  </div>

  <!-- Active chips + count -->
  <div class="meta-row" id="meta-row"></div>

  <!-- Active path bar -->
  <div id="path-bar-wrap"></div>

  <!-- Main layout -->
  <div class="layout">
    <div class="content-area" id="content-area">
      <div class="ld"><span class="ld-ring"></span>Loading wiki…</div>
    </div>
    <aside class="panel" id="panel">
      <div id="panel-inner"></div>
    </aside>
  </div>
</div>

<button class="scroll-top" id="scroll-top" aria-label="Scroll to top">↑</button>

<script>
const API='https://xvkq-pq7i-idtl.n7d.xano.io/api:GGzWIVAW/get_public_eowiki?content_type=wiki';

const CLUSTERS=[
  {id:'foundation',label:'Foundation',color:'#6366F1',bg:'#EEF2FF',text:'#4338CA',
   keys:['ground / figure','three triads','triadic minimum','emergent ontology (eo)']},
  {id:'entity',label:'Entity Types',color:'#0891B2',bg:'#ECFEFF',text:'#0E7490',
   keys:['emanon','protogon','holon']},
  {id:'operators',label:'Operators',color:'#D97706',bg:'#FFFBEB',text:'#B45309',
   keys:['nine operators','operator naming','mvp: minimum','minimum viable','ins']},
  {id:'structure',label:'Structure & Space',color:'#7C3AED',bg:'#F5F3FF',text:'#6D28D9',
   keys:['27 forms','capacity ground','degrees of freedom','three arrows','decal notation','axis triad']},
  {id:'notation',label:'Notation',color:'#DB2777',bg:'#FDF2F8',text:'#BE185D',
   keys:['eo notation','decal notation','operator naming']},
  {id:'lineage',label:'Philosophy & Lineage',color:'#059669',bg:'#ECFDF5',text:'#047857',
   keys:['influences and','integral lineage','three faces']},
  {id:'advanced',label:'Advanced Topics',color:'#DC2626',bg:'#FEF2F2',text:'#B91C1C',
   keys:['quantum weirdness','time as emergent','weirdness']}
];

const PATHS=[
  {id:'start',label:'Start here',desc:'New to EO',
   steps:['Emergent Ontology (EO)','Ground / Figure / Pattern','The Three Triads','The Nine Operators','The 27 Forms']},
  {id:'ops',label:'Operators',desc:'Formal operators in depth',
   steps:['INS','The Nine Operators','Operator Naming in Emergent Ontology','EO Notation','Decal Notation']},
  {id:'entities',label:'Entity Types',desc:'Emanon, Protogon, Holon',
   steps:['The Triadic Minimum','Emanon','Protogon','Holons','Degrees of Freedom']},
  {id:'formal',label:'Formal structure',desc:'Advanced reading',
   steps:['EO Capacity Ground Cube','Time as Emergent Dimension','Quantum Weirdness in EO: Contained but not Tamed','The Three Arrows']}
];

let arts=[],view='grouped',activePath=null,activeLv=null,q='',selectedId=null;
let collapsedSections=new Set();

function html2txt(h,max=140){
  const d=document.createElement('div');d.innerHTML=h;
  for(const p of d.querySelectorAll('p')){
    const t=p.textContent.trim();
    if(t.length>40) return t.length>max?t.slice(0,max)+'…':t;
  }
  return '';
}

function latest(a){const r=a.revisions||[];return r.length?r[r.length-1].content||'':'';}

function clusterOf(a){
  const t=a.meta.title.toLowerCase();
  for(const c of CLUSTERS) if(c.keys.some(k=>t.includes(k))) return c;
  const lv=(a.meta.tags||[])[0];
  if(lv==='101') return CLUSTERS[0];
  if(lv==='201') return CLUSTERS[2];
  if(lv==='301') return CLUSTERS[3];
  return CLUSTERS[CLUSTERS.length-1];
}

function timeAgo(ts){
  if(!ts) return '';
  const d=Date.now()-new Date(ts).getTime();
  const h=Math.floor(d/36e5);
  if(h<24) return h<2?'1 hour ago':`${h} hours ago`;
  const days=Math.floor(h/24);
  return days<2?'1 day ago':`${days} days ago`;
}

function related(art){
  const kw=new Set((art.meta.keywords||[]).map(k=>k.toLowerCase()));
  const cl=clusterOf(art).id;
  return arts.filter(a=>a.id!==art.id).map(a=>{
    const ak=new Set((a.meta.keywords||[]).map(k=>k.toLowerCase()));
    const s=[...kw].filter(k=>ak.has(k)).length*2+(clusterOf(a).id===cl?1:0);
    return {a,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,5).map(x=>x.a);
}

function filtered(){
  let r=arts.filter(a=>a.meta.status==='published'||!a.meta.status);
  if(q){
    const lq=q.toLowerCase();
    r=r.filter(a=>{
      const title=a.meta.title.toLowerCase();
      const kws=(a.meta.keywords||[]).some(k=>k.toLowerCase().includes(lq));
      const excerpt=html2txt(latest(a),500).toLowerCase().includes(lq);
      return title.includes(lq)||kws||excerpt;
    });
  }
  if(activeLv) r=r.filter(a=>(a.meta.tags||[]).includes(activeLv));
  if(activePath){const p=PATHS.find(x=>x.id===activePath);if(p)r=r.filter(a=>p.steps.some(s=>a.meta.title.toLowerCase().includes(s.toLowerCase())));}
  return r;
}

function renderLvFilters(){
  const lvs=[...new Set(arts.flatMap(a=>a.meta.tags||[]))].filter(Boolean).sort();
  document.getElementById('lv-filters').innerHTML=lvs.map(lv=>
    `<button class="fbtn${activeLv===lv?' on':''}" onclick="toggleLv('${lv}')">${lv}</button>`
  ).join('');
}

function renderPaths(){
  document.getElementById('rp-list').innerHTML=PATHS.map(p=>
    `<button class="rpath${activePath===p.id?' on':''}" onclick="togglePath('${p.id}')" title="${p.desc}">${p.label}</button>`
  ).join('');
}

function renderMeta(){
  const f=filtered();
  let html=`<span class="art-count">${f.length} article${f.length!==1?'s':''}</span>`;
  if(activeLv) html+=`<span class="chip">${activeLv}<button onclick="toggleLv('${activeLv}')" aria-label="Remove ${activeLv} filter">×</button></span>`;
  if(activePath){const p=PATHS.find(x=>x.id===activePath);if(p) html+=`<span class="chip">${p.label}<button onclick="togglePath('${p.id}')" aria-label="Remove ${p.label} path">×</button></span>`;}
  if(q) html+=`<span class="chip">"${q}"<button onclick="clearSearch()" aria-label="Clear search">×</button></span>`;
  document.getElementById('meta-row').innerHTML=html;
}

function renderPathBar(){
  if(!activePath){document.getElementById('path-bar-wrap').innerHTML='';return;}
  const p=PATHS.find(x=>x.id===activePath);
  if(!p){document.getElementById('path-bar-wrap').innerHTML='';return;}
  const steps=p.steps.map((s,i)=>{
    const found=arts.find(a=>a.meta.title.toLowerCase().includes(s.toLowerCase()));
    return `<div class="pstep${found?' found':' missing'}"${found?` onclick="showArt(${found.id})"`:''} title="${s}">
      <div class="pstep-n">${found?'✓':(i+1)}</div>
      <span class="pstep-t">${s}</span>
    </div>`;
  }).join('');
  document.getElementById('path-bar-wrap').innerHTML=`<div class="path-bar">
    <div class="path-bar-hd">
      <span class="path-bar-title">${p.label}</span>
      <span class="path-bar-desc">— ${p.desc}</span>
    </div>
    <div class="path-steps">${steps}</div>
  </div>`;
}

function cardHtml(a){
  const cl=clusterOf(a);
  const exc=html2txt(latest(a));
  const lv=(a.meta.tags||[]).filter(t=>t);
  const ago=timeAgo(a.meta.updated_at);
  const sel=selectedId===a.id;
  return `<div class="card${sel?' selected':''}" onclick="showArt(${a.id})" tabindex="0" role="button" aria-label="${a.meta.title}">
    <div class="card-top">
      <div class="card-icon" style="color:${cl.color};background:${cl.bg};border-color:${cl.color}20">
        <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
      </div>
      <div class="card-body">
        <div class="card-title">${highlightMatch(a.meta.title)}</div>
        ${ago?`<div class="card-time">${ago}</div>`:''}
      </div>
    </div>
    ${exc?`<div class="card-exc">${exc}</div>`:''}
    <div class="card-tags">
      ${lv.map(t=>`<span class="ctag">${t}</span>`).join('')}
    </div>
  </div>`;
}

function highlightMatch(text){
  if(!q) return text;
  const regex=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return text.replace(regex,'<mark style="background:rgba(99,102,241,.15);color:var(--purple-text);padding:0 1px;border-radius:2px">$1</mark>');
}

function toggleSection(id){
  if(collapsedSections.has(id)) collapsedSections.delete(id);
  else collapsedSections.add(id);
  renderContent();
}

function renderContent(){
  const f=filtered();
  let body='';

  if(view==='grouped'){
    body=CLUSTERS.map(cl=>{
      const ca=f.filter(a=>clusterOf(a).id===cl.id);
      if(!ca.length) return '';
      const collapsed=collapsedSections.has(cl.id);
      return `<div class="section">
        <div class="sec-hd" onclick="toggleSection('${cl.id}')">
          <span class="sec-tri ${collapsed?'closed':'open'}">▼</span>
          <span class="sec-badge" style="background:${cl.bg};color:${cl.text}">${cl.label} <span class="sec-n">${ca.length}</span></span>
        </div>
        <div class="sec-grid-wrap" style="${collapsed?'max-height:0;overflow:hidden':'max-height:none'}">
          <div class="grid">${ca.map(cardHtml).join('')}</div>
        </div>
      </div>`;
    }).join('');
  } else if(view==='level'){
    const lvs=[...new Set(f.flatMap(a=>a.meta.tags||[]))].filter(Boolean).sort();
    const colors={'101':['#EEF2FF','#4338CA'],'201':['#F5F3FF','#6D28D9'],'301':['#ECFDF5','#047857'],'401':['#FEF2F2','#B91C1C'],'operator':['#FFFBEB','#B45309']};
    body=lvs.map(lv=>{
      const la=f.filter(a=>(a.meta.tags||[]).includes(lv));
      if(!la.length) return '';
      const [bg,text]=colors[lv]||['#F3F4F6','#374151'];
      const collapsed=collapsedSections.has('lv-'+lv);
      return `<div class="section">
        <div class="sec-hd" onclick="toggleSection('lv-${lv}')">
          <span class="sec-tri ${collapsed?'closed':'open'}">▼</span>
          <span class="sec-badge" style="background:${bg};color:${text}">${lv} <span class="sec-n">${la.length}</span></span>
        </div>
        <div class="sec-grid-wrap" style="${collapsed?'max-height:0;overflow:hidden':'max-height:none'}">
          <div class="grid">${la.map(cardHtml).join('')}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    body=`<div class="grid">${f.map(cardHtml).join('')}</div>`;
  }

  document.getElementById('content-area').innerHTML=body||`<div class="empty">No articles match your filters.</div>`;
}

function showArt(id){
  const a=arts.find(x=>x.id===id);
  if(!a) return;
  selectedId=id;
  const cl=clusterOf(a);
  const exc=html2txt(latest(a),400);
  const rel=related(a);
  const lv=(a.meta.tags||[]).filter(t=>t);
  const panel=document.getElementById('panel');
  const overlay=document.getElementById('panel-overlay');
  panel.classList.add('open');
  overlay.classList.add('open');

  document.getElementById('panel-inner').innerHTML=`
    <button class="panel-close" onclick="closePanel()" aria-label="Close panel">×</button>
    <div class="panel-lv">
      ${lv.map(t=>`<span class="ctag purple">${t}</span>`).join(' ')}
      <span class="ctag" style="background:${cl.bg};color:${cl.text};border-color:${cl.color}20">${cl.label}</span>
    </div>
    <h2 class="panel-title">${a.meta.title}</h2>
    <p class="panel-exc">${exc||'No preview available.'}</p>
    ${rel.length?`
      <div class="panel-sh">Related articles</div>
      <ul class="rel-list">${rel.map(r=>{
        const rc=clusterOf(r);
        const rl=(r.meta.tags||[]).filter(t=>t)[0]||'';
        return `<li class="rel-item" onclick="showArt(${r.id})" tabindex="0" role="button">
          <div class="rel-icon" style="color:${rc.color};background:${rc.bg};border-color:${rc.color}20">
            <svg width="8" height="8" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
          </div>
          <span class="rel-t">${r.meta.title}</span>
          <span class="rel-lv">${rl}</span>
        </li>`;
      }).join('')}</ul>`:''}
    <button class="open-btn" onclick="alert('Full article opens here')">Open article →</button>`;
  renderContent();
}

function closePanel(){
  selectedId=null;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  renderContent();
}

function togglePath(id){
  activePath=activePath===id?null:id;
  renderPaths();renderMeta();renderPathBar();renderContent();
}

function toggleLv(lv){
  activeLv=activeLv===lv?null:lv;
  renderLvFilters();renderMeta();renderContent();
}

function clearSearch(){
  q='';
  document.getElementById('srch').value='';
  document.getElementById('srch-wrap').classList.remove('has-query');
  renderMeta();renderContent();
}

// ── View toggle ──
document.querySelectorAll('.fbtn[data-v]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fbtn[data-v]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    view=b.dataset.v;
    collapsedSections.clear();
    renderContent();
  });
});

// ── Search with debounce ──
let searchTimer=null;
const srchInput=document.getElementById('srch');
const srchWrap=document.getElementById('srch-wrap');

srchInput.addEventListener('input',e=>{
  clearTimeout(searchTimer);
  const val=e.target.value.trim();
  srchWrap.classList.toggle('has-query',val.length>0);
  searchTimer=setTimeout(()=>{
    q=val;
    renderMeta();renderContent();
  },150);
});

document.getElementById('srch-clear').addEventListener('click',clearSearch);

// ── Keyboard shortcuts ──
document.addEventListener('keydown',e=>{
  // "/" to focus search
  if(e.key==='/'&&document.activeElement!==srchInput){
    e.preventDefault();
    srchInput.focus();
    return;
  }
  // Escape to close panel or clear search
  if(e.key==='Escape'){
    if(document.getElementById('panel').classList.contains('open')){
      closePanel();
    } else if(document.activeElement===srchInput){
      if(q){clearSearch();}
      else{srchInput.blur();}
    }
  }
});

// ── Card keyboard activation ──
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.classList.contains('card')){
    e.target.click();
  }
});

// ── Mobile menu ──
document.getElementById('menu-toggle').addEventListener('click',()=>{
  document.getElementById('nav').classList.toggle('mobile-open');
});

// ── Panel overlay close on mobile ──
document.getElementById('panel-overlay').addEventListener('click',closePanel);

// ── Scroll to top ──
const scrollBtn=document.getElementById('scroll-top');
window.addEventListener('scroll',()=>{
  scrollBtn.classList.toggle('visible',window.scrollY>300);
},{passive:true});
scrollBtn.addEventListener('click',()=>{
  window.scrollTo({top:0,behavior:'smooth'});
});

// ── Data fetch ──
fetch(API).then(r=>r.json()).then(data=>{
  arts=data.map(row=>{
    const v=typeof row.values==='string'?JSON.parse(row.values):row.values;
    return {id:row.id,meta:v.meta||{},revisions:v.revisions||[]};
  }).filter(a=>a.meta&&a.meta.title);
  renderLvFilters();
  renderPaths();
  renderMeta();
  renderPathBar();
  renderContent();
}).catch(err=>{
  document.getElementById('content-area').innerHTML=`<div class="ld">Failed to load wiki data.<br><small>${err.message}</small></div>`;
});
</script>
</body>
</html>
